version: '3.8'

services:
  backend:
    image: ghcr.io/fredericmoussavou/kipar-backend:latest
    container_name: kipar-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: kipar-redis
    restart: always
    ports:
      - "6379:6379"
