services:
  backend:
    image: ghcr.io/fredericmoussavou/kipar-backend:latest
    container_name: kipar-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - kipar-net
  redis:
    image: redis:7-alpine
    container_name: kipar-redis
    restart: always
    networks:
      - kipar-net
networks:
  kipar-net:
    driver: bridge
